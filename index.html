<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falke FM · E-Mail Coach</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f1117;
      font-family: 'DM Sans', sans-serif;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 12px;
      padding: 8px 16px;
      margin-bottom: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #f0b429;
      letter-spacing: 0.08em;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      max-width: 360px;
      margin-bottom: 32px;
    }

    .container { width: 100%; max-width: 680px; }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #f0b429;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    textarea, input[type="text"] {
      width: 100%;
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 12px;
      padding: 16px;
      color: #e8e8e8;
      font-size: 14px;
      line-height: 1.7;
      font-family: 'DM Sans', sans-serif;
      resize: vertical;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    textarea:focus, input:focus {
      outline: none;
      border-color: #f0b429;
    }

    .field { margin-bottom: 20px; }

    .btn-primary {
      width: 100%;
      background: #f0b429;
      color: #0f1117;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-primary:hover:not(:disabled) { background: #e8a838; transform: translateY(-1px); }
    .btn-primary:disabled { background: #2e3347; color: #4b5563; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      background: transparent;
      color: #6b7280;
      border: 1px solid #2e3347;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
      margin-top: 10px;
    }

    .btn-secondary:hover { background: #1a1d27; }

    /* Chat */
    #chat-view { display: none; }

    .chat-box {
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      max-height: 55vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; align-items: flex-start; gap: 10px; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f0b429;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: #2e3347;
      border-radius: 16px 16px 4px 16px;
      color: #cbd5e1;
    }

    .msg.assistant .bubble {
      background: #23263a;
      border-radius: 16px 16px 16px 4px;
      color: #e8e8e8;
    }

    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; background: #23263a; border-radius: 16px 16px 16px 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #f0b429; opacity: 0.4; animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.4} 50%{transform:scale(1.3);opacity:1} }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-row input {
      flex: 1;
      resize: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
    }

    .btn-send {
      background: #f0b429;
      color: #0f1117;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-send:hover:not(:disabled) { background: #e8a838; }
    .btn-send:disabled { background: #2e3347; color: #4b5563; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1d27; }
    ::-webkit-scrollbar-thumb { background: #2e3347; border-radius: 3px; }
  </style>
</head>
<body>

  <div class="badge">✉️ &nbsp;FALKE FM · E-MAIL COACH</div>
  <h1>E-Mail prüfen lassen</h1>
  <p class="subtitle">Kunden-E-Mail und deinen Entwurf einfügen — der Coach prüft, fragt nach und erstellt dann die fertige Antwort.</p>

  <div class="container">

    <!-- Input View -->
    <div id="input-view">
      <div class="field">
        <label>KUNDEN-E-MAIL (EINGEGANGEN)</label>
        <textarea id="customer-email" rows="7" placeholder="Hier die E-Mail des Kunden einfügen..."></textarea>
      </div>
      <div class="field">
        <label>MEIN ENTWURF</label>
        <textarea id="draft-reply" rows="7" placeholder="Hier deinen geplanten Antwort-Entwurf einfügen..."></textarea>
      </div>
      <button class="btn-primary" id="start-btn" disabled onclick="startCoaching()">E-Mail prüfen lassen →</button>
    </div>

    <!-- Chat View -->
    <div id="chat-view">
      <div class="chat-box" id="chat-box"></div>
      <div class="input-row">
        <input type="text" id="user-input" placeholder="Antwort auf die Rückfragen eingeben..." onkeydown="handleKey(event)">
        <button class="btn-send" id="send-btn" onclick="sendMessage()">Senden</button>
      </div>
      <button class="btn-secondary" onclick="reset()">← Neue E-Mail prüfen</button>
    </div>

  </div>

  <script>
    const SYSTEM_PROMPT = `Du bist ein E-Mail-Coach für einen Objektleiter im Facility Management. Deine Aufgabe ist es, seine geplante Antwort zu prüfen bevor er sie abschickt.

Arbeite in zwei Phasen:

PHASE 1 – Rückfragen:
Wenn die Antwort unklar, unvollständig oder möglicherweise falsch ist, stelle konkrete Rückfragen. Beispiele:
- Hast du das wirklich bereits erledigt, oder planst du es nur?
- Was genau ist an der [Anlage/Gerät] das Problem – weißt du das konkret?
- Punkt X aus der Kunden-E-Mail wurde nicht beantwortet – was ist der Status?
- Ist der Fachbegriff "[Begriff]" korrekt? Was meinst du damit genau?

Stelle maximal 3 gezielte Rückfragen auf einmal. Sei direkt und freundlich, nicht herablassend.

PHASE 2 – Entwurf:
Sobald alle Unklarheiten geklärt sind, schreibe einen professionellen E-Mail-Entwurf auf Basis der geklärten Informationen.

Der Entwurf soll:
- Professionell und freundlich sein
- Alle Punkte aus der Kunden-E-Mail adressieren
- Nur Dinge enthalten die tatsächlich erledigt/geklärt sind
- Klar strukturiert sein (ggf. nummerierte Punkte)
- Mit "Mit freundlichen Grüßen" enden

Antworte immer auf Deutsch. Sei präzise und praktisch.`;

    let messages = [];
    let loading = false;

    // Enable button when both fields filled
    document.getElementById('customer-email').addEventListener('input', checkFields);
    document.getElementById('draft-reply').addEventListener('input', checkFields);

    function checkFields() {
      const a = document.getElementById('customer-email').value.trim();
      const b = document.getElementById('draft-reply').value.trim();
      document.getElementById('start-btn').disabled = !(a && b);
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    async function startCoaching() {
      const customerEmail = document.getElementById('customer-email').value.trim();
      const draftReply = document.getElementById('draft-reply').value.trim();

      document.getElementById('input-view').style.display = 'none';
      document.getElementById('chat-view').style.display = 'block';

      const firstMessage = `Kunden-E-Mail:\n${customerEmail}\n\nMein geplanter Entwurf:\n${draftReply}`;
      messages = [{ role: 'user', content: firstMessage }];

      appendMessage('user', 'E-Mail und Entwurf eingereicht ✓');
      await callAPI();
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text || loading) return;

      input.value = '';
      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      await callAPI();
    }

    async function callAPI() {
      loading = true;
      document.getElementById('send-btn').disabled = true;

      const typingEl = appendTyping();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, system: SYSTEM_PROMPT })
        });

        const data = await response.json();
        typingEl.remove();

        if (data.error) {
          appendMessage('assistant', `Fehler: ${data.error}`);
        } else {
          messages.push({ role: 'assistant', content: data.content });
          appendMessage('assistant', data.content);
        }
      } catch (e) {
        typingEl.remove();
        appendMessage('assistant', `Fehler: ${e.message}`);
      }

      loading = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').focus();
    }

    function appendMessage(role, text) {
      const box = document.getElementById('chat-box');
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      if (role === 'assistant') {
        msg.innerHTML = `<div class="avatar">✦</div><div class="bubble">${escapeHtml(text)}</div>`;
      } else {
        msg.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
      }

      box.appendChild(msg);
      box.scrollTop = box.scrollHeight;
      return msg;
    }

    function appendTyping() {
      const box = document.getElementById('chat-box');
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.innerHTML = `<div class="avatar">✦</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      box.appendChild(msg);
      box.scrollTop = box.scrollHeight;
      return msg;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function reset() {
      messages = [];
      document.getElementById('chat-box').innerHTML = '';
      document.getElementById('customer-email').value = '';
      document.getElementById('draft-reply').value = '';
      document.getElementById('user-input').value = '';
      document.getElementById('chat-view').style.display = 'none';
      document.getElementById('input-view').style.display = 'block';
      document.getElementById('start-btn').disabled = true;
    }
  </script>

</body>
</html>
